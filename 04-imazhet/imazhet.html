<!DOCTYPE html>
<html>
    <head>
        <title>Struktura e HTML-se</title>

        <style>
            .bird-image {
                width: 300px;
                height: 400px;
                object-fit: contain;
                border: 3px solid red;
                object-position: bottom;
            }

            body {
                background: url("bird.avif");
                background-size: cover;
                background-repeat: no-repeat;
            }
        </style>
    </head>
    

    <body>
        <img src="bird.avif" class="bird-image">
    </body>

</html>
