<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>

    <style>
        .inputi-emri{
            display: inline-block;
            width: 100px;
            border-color: blue;
            border-style: solid;
            border-radius: 5px;
        }

        .inputi-emri::placeholder {
            color: blue;
        }

        .inputi-mbiemri {
            width: 100px;
              border-color: blue;
            border-style: solid;
            border-radius: 5px;
        }

        .inputi-mbiemri::placeholder {
            color: blue;
        }

        .inputi-email {
            width: 211px;
            display: block;
            margin-top: 10px;
              border-color: blue;
            border-style: solid;
            border-radius: 5px;
        }

        .inputi-email::placeholder {
            color: blue;
        }

        .submit-button {
            margin-top: 5px;
            background-color: rgb(0, 145, 255);
            color: white;
            border: none;
            border-radius: 5px;
            width: 220px;
            height: 27px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Sign up form</h1>

    <form action="">
        <input type="text" placeholder="Emri" class="inputi-emri">
        <input type="text" placeholder="Mbiemri" class="inputi-mbiemri">
        <input type="email" placeholder="Email" class="inputi-email">
        <input type="submit" value="Sign Up" class="submit-button">

    </form>
        
</body>
</html>
