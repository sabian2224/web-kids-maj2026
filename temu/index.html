<!DOCTYPE html>
<html>
    <head>
        <title></title>

        <!--Iportimi i fonteve te reja-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <style>
            body {
                background-color: black;
            }

            p {
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
                cursor: pointer;
            }

            .delivery-truck-icon{
                width: 40px;
            }

            .free-shipping-text{
                color: rgb(173, 255, 162);
                font-weight: bold;
            }

            .free-shipping-text:hover {
                text-decoration: underline;
            }

            .incredible-text{
                color: rgb(173, 255, 162);
            }

            .return-text {
                color: #FFF7A7;
                font-weight: bold;
            }

            .return-text:hover{
                text-decoration: underline;
            }

            .purchase-date-text {
                color: #FFF7A7;
            }

            
        </style>
    </head>

    <body>
        <img src="delivery-truck.png" class="delivery-truck-icon">
        <p class="free-shipping-text">Free shipping</p>
        <p class="incredible-text">Incredible</p>

        <!--Block Elements:
        Block elements e marin te gjithe rreshtin per vete.
        -->

        <!--Inline Block Element:
        Marin aq hapesire sa u nevojitet.
        -->

        <img src="return.png" class="delivery-truck-icon">
        <p class="return-text">Return within 90d</p>
        <p class="purchase-date-text">From purchase date</p>


        <img src="iphone.png" class="delivery-truck-icon">
        <p class="return-text">Get the temu app</p>


    </body>

</html>
