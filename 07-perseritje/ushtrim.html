<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    

    <style>
        body{
            background-color: #855cd6;
        }


        .scratch-logo{
            width: 200px;
        }

        h1{
            font-family: Arial, Helvetica, sans-serif;
            max-width: 650px;
            color: white;
        }

        .stars-icon, .bolt-icon {
            width: 16px;
            vertical-align: middle;
        }

        .buton-standard { 
            background-color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #855cd6;
        }
    </style>
</head>
<body>


    <img src="Scratch-Emblem.png" class="scratch-logo">

    <h1>
        Create stories, games, and animations
        Share with others around the world
    </h1>

    <button class="buton-standard">
        <img src="stars.png" class="stars-icon">
        Start Creating
    </button>
    <button class="buton-standard">
        <img src="bolt.png" class="bolt-icon">
        Join
    </button>
    
</body>
</html>
